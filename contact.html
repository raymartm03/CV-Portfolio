<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Hub - Contact</title>
    <link rel="stylesheet" href="football.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <h1 class="nav-title">FOOTBALL HUB</h1>
            <nav class="nav-links">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                    <li><button id="dark-mode-toggle" class="dark-mode-btn from-left" aria-label="Toggle theme">Dark Mode</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="section" id="contact">
            <h2>Contact</h2>
            <div class="section-text">
                <p>Reach out to talk football or share feedback!</p>
                <p>Email: footballmarty@email.com</p>
                <p>Instagram: @martyfootball</p>
                <form class="contact-form">
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <textarea name="message" placeholder="Your Message" required></textarea>
                    <button type="submit" class="from-center" aria-label="Send contact message">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Contact us: footballmarty@email.com | Instagram: @martyfootball</p>
    </footer>

    <script src="football.js"></script>
</body>
</html>
